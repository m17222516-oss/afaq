{% extends "base.html" %}
{% block title %}تعديل التبليغ — آفاق الفكر{% endblock %}
{% block page_title %}تعديل التبليغ{% endblock %}
{% block content %}

<div style="max-width: 1000px; margin: 0 auto">
    <div class="card">
        <div class="card-head">
            <h2>
                <i class="fas fa-edit" style="color: var(--accent)"></i> تعديل التبليغ
            </h2>
        </div>
        <div class="card-body">
            <form method="POST" id="announcementForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">عنوان التبليغ <span class="req">*</span></label>
                    <input
                        name="title"
                        type="text"
                        class="form-control"
                        id="titleInput"
                        value="{{ ann.title }}"
                        required
                        placeholder="أدخل عنواناً واضحاً ومختصراً"
                    />
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">القسم <span class="req">*</span></label>
                        <select
                            name="department_id"
                            class="form-control"
                            required
                            id="departmentSelect"
                            {% if session.role != "superadmin" %}disabled{% endif %}
                        >
                            {% for d in departments %}
                            <option value="{{ d.id }}" {% if d.id == ann.department_id %}selected{% endif %}>
                                {{ d.name_ar }}
                            </option>
                            {% endfor %}
                        </select>
                        {% if session.role != 'superadmin' %}
                        <input
                            type="hidden"
                            name="department_id"
                            value="{{ ann.department_id }}"
                        />
                        {% endif %}
                    </div>
                    <div class="form-group">
                        <label class="form-label">الأولوية</label>
                        <select name="priority" class="form-control" id="prioritySelect">
                            <option value="normal" {% if ann.priority == "normal" %}selected{% endif %}>● عادي</option>
                            <option value="low" {% if ann.priority == "low" %}selected{% endif %}>↓ منخفض</option>
                            <option value="high" {% if ann.priority == "high" %}selected{% endif %}>↑ مهم</option>
                            <option value="urgent" {% if ann.priority == "urgent" %}selected{% endif %}>⚡ عاجل</option>
                        </select>
                    </div>
                </div>

                <!-- Rich Text Editor Toolbar -->
                <div class="form-group">
                    <label class="form-label">نص التبليغ <span class="req">*</span></label>

                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" data-command="bold" title="غامق">
                            <i class="fas fa-bold"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="italic" title="مائل">
                            <i class="fas fa-italic"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="underline" title="تسطير">
                            <i class="fas fa-underline"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="strikeThrough" title="يتوسطه خط">
                            <i class="fas fa-strikethrough"></i>
                        </button>
                        <span class="toolbar-divider"></span>

                        <select class="toolbar-select" data-command="formatBlock">
                            <option value="p">نص عادي</option>
                            <option value="h1">عنوان رئيسي 1</option>
                            <option value="h2">عنوان رئيسي 2</option>
                            <option value="h3">عنوان رئيسي 3</option>
                        </select>

                        <span class="toolbar-divider"></span>

                        <button type="button" class="toolbar-btn" data-command="insertUnorderedList" title="قائمة نقطية">
                            <i class="fas fa-list-ul"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="insertOrderedList" title="قائمة رقمية">
                            <i class="fas fa-list-ol"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button type="button" class="toolbar-btn" data-command="justifyLeft" title="محاذاة لليسار">
                            <i class="fas fa-align-left"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="justifyCenter" title="محاذاة للوسط">
                            <i class="fas fa-align-center"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="justifyRight" title="محاذاة لليمين">
                            <i class="fas fa-align-right"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="justifyFull" title="محاذاة كاملة">
                            <i class="fas fa-align-justify"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <input type="color" class="toolbar-color" data-command="foreColor" title="لون النص" value="#000000" />
                        <input type="color" class="toolbar-color" data-command="hiliteColor" title="لون الخلفية" value="#ffff00" />

                        <span class="toolbar-divider"></span>

                        <button type="button" class="toolbar-btn" data-command="createLink" title="إضافة رابط">
                            <i class="fas fa-link"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="unlink" title="إزالة الرابط">
                            <i class="fas fa-unlink"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <label class="toolbar-btn toolbar-file-label" title="إدراج صورة">
                            <i class="fas fa-image"></i>
                            <span>صورة</span>
                            <input type="file" id="imageUpload" accept="image/jpeg,image/png,image/gif,image/webp" style="display: none" />
                        </label>

                        <span class="toolbar-divider"></span>

                        <button type="button" class="toolbar-btn" data-command="undo" title="تراجع">
                            <i class="fas fa-undo"></i>
                        </button>
                        <button type="button" class="toolbar-btn" data-command="redo" title="إعادة">
                            <i class="fas fa-redo"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button type="button" class="toolbar-btn" data-command="removeFormat" title="إزالة التنسيق">
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>

                    <!-- Editor Content -->
                    <div id="editor" class="rich-editor" contenteditable="true" data-placeholder="اكتب نص التبليغ هنا...">
                        {{ ann.body|safe }}
                    </div>
                    <textarea name="body" id="bodyInput" style="display: none">{{ ann.body|safe }}</textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="is_pinned" {% if ann.is_pinned %}checked{% endif %} />
                        <i class="fas fa-thumbtack"></i>
                        تثبيت التبليغ في الأعلى
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-accent" id="submitBtn">
                        <i class="fas fa-save"></i> حفظ التعديلات
                    </button>
                    <button type="button" class="btn btn-ghost" onclick="showPreview()">
                        <i class="fas fa-eye"></i> معاينة
                    </button>
                    <a href="{{ url_for('announcements.detail', ann_id=ann.id) }}" class="btn btn-ghost">إلغاء</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" style="display: none">
    <div class="preview-modal-content">
        <div class="preview-modal-header">
            <h3><i class="fas fa-eye"></i> معاينة التبليغ</h3>
            <button class="preview-close" onclick="closePreview()">&times;</button>
        </div>
        <div class="preview-modal-body">
            <div class="preview-badge-area"></div>
            <h2 class="preview-title"></h2>
            <div class="preview-meta"></div>
            <div class="preview-content" id="previewContent"></div>
        </div>
    </div>
</div>

<style>
    /* Editor toolbar styles */
    .editor-toolbar {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--r-sm) var(--r-sm) 0 0;
        padding: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
        position: sticky;
        top: 56px;
        z-index: 50;
    }

    .toolbar-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 6px 10px;
        cursor: pointer;
        color: var(--text);
        font-size: 13px;
        transition: var(--t);
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .toolbar-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent);
        color: var(--accent);
    }

    .toolbar-select {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 6px 8px;
        color: var(--text);
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
    }

    .toolbar-color {
        width: 36px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        cursor: pointer;
        padding: 2px;
        background: var(--bg-card);
    }

    .toolbar-divider {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
    }

    .rich-editor {
        min-height: 400px;
        max-height: 500px;
        overflow-y: auto;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--r-sm) var(--r-sm);
        padding: 16px;
        color: var(--text);
        font-size: 14px;
        line-height: 1.8;
        direction: rtl;
        text-align: right;
    }

    .rich-editor:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .rich-editor:empty:before {
        content: attr(data-placeholder);
        color: var(--text-3);
        opacity: 0.6;
    }

    .rich-editor img {
        max-width: 100%;
        height: auto;
        border-radius: var(--r-sm);
        margin: 10px 0;
        cursor: pointer;
        display: block;
    }

    .rich-editor h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 16px 0 8px 0;
    }

    .rich-editor h2 {
        font-size: 24px;
        font-weight: 700;
        margin: 14px 0 6px 0;
    }

    .rich-editor h3 {
        font-size: 20px;
        font-weight: 600;
        margin: 12px 0 4px 0;
    }

    .rich-editor ul,
    .rich-editor ol {
        padding-right: 20px;
        margin: 10px 0;
    }

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 9px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-2);
    }

    .checkbox-label input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
        cursor: pointer;
    }

    .checkbox-label i {
        color: var(--accent);
    }

    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
    }

    .preview-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .preview-modal-content {
        background: var(--bg-card-2);
        border-radius: var(--r-lg);
        width: 90%;
        max-width: 800px;
        max-height: 80vh;
        overflow: hidden;
        border: 1px solid var(--border-2);
        box-shadow: var(--sh-lg);
    }

    .preview-modal-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .preview-modal-header h3 {
        font-size: 16px;
        margin: 0;
        color: var(--text-white);
    }

    .preview-close {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: var(--text-3);
        transition: var(--t);
    }

    .preview-close:hover {
        color: var(--accent);
    }

    .preview-modal-body {
        padding: 20px;
        overflow-y: auto;
        max-height: calc(80vh - 60px);
    }

    .preview-title {
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 12px;
        color: var(--text-white);
    }

    .preview-meta {
        font-size: 11px;
        color: var(--text-3);
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
    }

    .preview-content {
        color: var(--text);
        line-height: 1.8;
    }

    .preview-content img {
        max-width: 100%;
        height: auto;
        border-radius: var(--r-sm);
        margin: 10px 0;
        display: block;
    }

    @media (max-width: 768px) {
        .editor-toolbar {
            top: 0;
            position: relative;
        }
        
        .toolbar-btn span {
            display: none;
        }
        
        .toolbar-btn {
            padding: 6px 8px;
        }
        
        .form-actions {
            flex-direction: column;
        }
        
        .form-actions .btn {
            width: 100%;
            justify-content: center;
        }
    }
</style>

<script>
    // Rich Text Editor Implementation
    const editor = document.getElementById('editor');
    const bodyInput = document.getElementById('bodyInput');
    const titleInput = document.getElementById('titleInput');
    const prioritySelect = document.getElementById('prioritySelect');

    let savedRange = null;

    function saveCursor() {
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
            savedRange = sel.getRangeAt(0).cloneRange();
        }
    }

    function restoreCursor() {
        if (savedRange) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
            savedRange = null;
        }
    }

    editor.addEventListener('mouseup', saveCursor);
    editor.addEventListener('keyup', saveCursor);
    editor.addEventListener('click', saveCursor);

    // Execute command on editor
    function execCommand(command, value = null) {
        editor.focus();
        restoreCursor();
        document.execCommand(command, false, value);
        editor.focus();
    }

    // Setup toolbar buttons
    document.querySelectorAll('.toolbar-btn').forEach(btn => {
        if (btn.tagName === 'LABEL') return;

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const command = btn.dataset.command;

            if (command === 'createLink') {
                const url = prompt('أدخل رابط URL:', 'https://');
                if (url) execCommand('createLink', url);
            } else if (command === 'formatBlock') {
                const value = btn.dataset.value;
                if (value) execCommand('formatBlock', '<' + value + '>');
            } else {
                execCommand(command);
            }
        });
    });

    // Handle select dropdowns
    document.querySelectorAll('.toolbar-select').forEach(select => {
        select.addEventListener('change', () => {
            const command = select.dataset.command;
            const value = select.value;
            if (command === 'formatBlock') {
                execCommand('formatBlock', value === 'p' ? '<p>' : '<' + value + '>');
            }
        });
    });

    // Handle color pickers
    document.querySelectorAll('.toolbar-color').forEach(colorPicker => {
        colorPicker.addEventListener('change', () => {
            const command = colorPicker.dataset.command;
            execCommand(command, colorPicker.value);
        });
    });

    // Image upload
    const imageUpload = document.getElementById('imageUpload');
    const uploadLabel = imageUpload ? imageUpload.closest('.toolbar-btn') : null;

    if (imageUpload) {
        imageUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            if (file.size > 5 * 1024 * 1024) {
                alert('حجم الصورة كبير جداً. الحد الأقصى هو 5 ميجابايت.');
                imageUpload.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            if (uploadLabel) {
                const originalHTML = uploadLabel.innerHTML;
                uploadLabel.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>جاري الرفع...</span>';
                uploadLabel.style.opacity = '0.7';

                try {
                    const response = await fetch('{{ url_for("announcements.upload_image") }}', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (data.success) {
                        saveCursor();
                        const imgHtml = '<img src="' + data.url + '" alt="Uploaded image" style="max-width: 100%; height: auto; margin: 10px 0; display: block; border-radius: var(--r-sm);">';
                        execCommand('insertHTML', imgHtml);
                    } else {
                        alert('خطأ في رفع الصورة: ' + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert('حدث خطأ أثناء رفع الصورة');
                } finally {
                    uploadLabel.innerHTML = originalHTML;
                    uploadLabel.style.opacity = '1';
                    imageUpload.value = '';
                }
            }
        });
    }

    // Preview functionality
    function showPreview() {
        const title = titleInput.value || 'عنوان التبليغ';
        let priority = 'عادي';
        let priorityValue = 'normal';
        
        if (prioritySelect && prioritySelect.options && prioritySelect.selectedIndex >= 0) {
            priority = prioritySelect.options[prioritySelect.selectedIndex].text || 'عادي';
            priorityValue = prioritySelect.value;
        }
        
        const content = editor.innerHTML || 'لا يوجد محتوى';

        const modal = document.getElementById('previewModal');
        if (!modal) return;
        
        const previewContent = document.getElementById('previewContent');
        if (previewContent) previewContent.innerHTML = content;
        
        const previewTitle = modal.querySelector('.preview-title');
        if (previewTitle) previewTitle.textContent = title;

        const now = new Date();
        const previewMeta = modal.querySelector('.preview-meta');
        if (previewMeta) {
            previewMeta.innerHTML = '<i class="fas fa-user"></i> {{ session.full_name }} &nbsp;&nbsp;' +
                '<i class="fas fa-calendar"></i> ' + now.toISOString().slice(0,10) + ' ' + now.toTimeString().slice(0,5);
        }

        const badgeMap = { urgent: 'b-urgent', high: 'b-high', low: 'b-low', normal: 'b-normal' };
        const previewBadge = modal.querySelector('.preview-badge-area');
        if (previewBadge) {
            previewBadge.innerHTML = '<span class="badge ' + (badgeMap[priorityValue] || 'b-normal') + '">' + priority + '</span>';
        }

        modal.style.display = 'flex';
    }

    function closePreview() {
        const modal = document.getElementById('previewModal');
        if (modal) modal.style.display = 'none';
    }

    window.showPreview = showPreview;
    window.closePreview = closePreview;

    // Form submission
    const form = document.getElementById('announcementForm');
    if (form) {
        form.addEventListener('submit', function () {
            if (bodyInput) bodyInput.value = editor.innerHTML;
        });
    }

    // Close modal on escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePreview();
    });

    const previewModal = document.getElementById('previewModal');
    if (previewModal) {
        previewModal.addEventListener('click', function (e) {
            if (e.target === this) closePreview();
        });
    }

    // Make editor focusable and move cursor to end
    if (editor) {
        editor.focus();
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(editor);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }
</script>

{% endblock %}
