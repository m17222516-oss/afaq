{% extends "base.html" %} {% block title %}تبليغ جديد — آفاق الفكر{% endblock %}
{% block page_title %}نشر تبليغ جديد{% endblock %} {% block content %}

<div style="max-width: 1000px; margin: 0 auto">
    <div class="card">
        <div class="card-head">
            <h2>
                <i class="fas fa-bullhorn" style="color: var(--accent)"></i>
                تبليغ جديد
            </h2>
        </div>
        <div class="card-body">
            <form
                method="POST"
                id="announcementForm"
                enctype="multipart/form-data"
            >
                <div class="form-group">
                    <label class="form-label"
                        >عنوان التبليغ <span class="req">*</span></label
                    >
                    <input
                        name="title"
                        type="text"
                        class="form-control"
                        id="titleInput"
                        placeholder="أدخل عنواناً واضحاً ومختصراً"
                        required
                    />
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"
                            >القسم <span class="req">*</span></label
                        >
                        <select
                            name="department_id"
                            class="form-control"
                            required
                            id="departmentSelect"
                        >
                            <option value="">— اختر القسم —</option>
                            {% if session.role == 'superadmin' %}
                            <option value="999">
                                🌍 جميع الأقسام والدوائر
                            </option>
                            {% endif %} {% for d in departments %} {% if d.id !=
                            999 %}
                            <option value="{{ d.id }}">{{ d.name_ar }}</option>
                            {% endif %} {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الأولوية</label>
                        <select
                            name="priority"
                            class="form-control"
                            id="prioritySelect"
                        >
                            <option value="normal">● عادي</option>
                            <option value="low">↓ منخفض</option>
                            <option value="high">↑ مهم</option>
                            <option value="urgent">⚡ عاجل</option>
                        </select>
                    </div>
                </div>

                {% if session.role == 'superadmin' %}
                <div class="form-group">
                    <label class="checkbox-label">
                        <input
                            type="checkbox"
                            name="is_global"
                            id="isGlobalCheckbox"
                        />
                        <i class="fas fa-globe"></i>
                        تبليغ عام (يظهر لجميع الأقسام والدوائر)
                    </label>
                </div>
                {% endif %}

                <!-- Rich Text Editor -->
                <div class="form-group">
                    <label class="form-label"
                        >نص التبليغ <span class="req">*</span></label
                    >

                    <!-- Toolbar -->
                    <div class="editor-toolbar">
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="bold"
                            title="غامق"
                        >
                            <i class="fas fa-bold"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="italic"
                            title="مائل"
                        >
                            <i class="fas fa-italic"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="underline"
                            title="تسطير"
                        >
                            <i class="fas fa-underline"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="strikeThrough"
                            title="يتوسطه خط"
                        >
                            <i class="fas fa-strikethrough"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="insertUnorderedList"
                            title="قائمة نقطية"
                        >
                            <i class="fas fa-list-ul"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="insertOrderedList"
                            title="قائمة رقمية"
                        >
                            <i class="fas fa-list-ol"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="justifyRight"
                            title="محاذاة لليمين"
                        >
                            <i class="fas fa-align-right"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="justifyCenter"
                            title="محاذاة للوسط"
                        >
                            <i class="fas fa-align-center"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="justifyLeft"
                            title="محاذاة لليسار"
                        >
                            <i class="fas fa-align-left"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="createLink"
                            title="إضافة رابط"
                        >
                            <i class="fas fa-link"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="unlink"
                            title="إزالة الرابط"
                        >
                            <i class="fas fa-unlink"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <label
                            class="toolbar-btn toolbar-file-label"
                            title="إدراج صورة"
                        >
                            <i class="fas fa-image"></i> صورة
                            <input
                                type="file"
                                id="imageUpload"
                                accept="image/jpeg,image/png,image/gif,image/webp"
                                style="display: none"
                            />
                        </label>

                        <span class="toolbar-divider"></span>

                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="undo"
                            title="تراجع"
                        >
                            <i class="fas fa-undo"></i>
                        </button>
                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="redo"
                            title="إعادة"
                        >
                            <i class="fas fa-redo"></i>
                        </button>

                        <span class="toolbar-divider"></span>

                        <button
                            type="button"
                            class="toolbar-btn"
                            data-command="removeFormat"
                            title="إزالة التنسيق"
                        >
                            <i class="fas fa-eraser"></i>
                        </button>
                    </div>

                    <!-- Editor Content -->
                    <div
                        id="editor"
                        class="rich-editor"
                        contenteditable="true"
                        data-placeholder="اكتب نص التبليغ هنا..."
                    ></div>
                    <textarea
                        name="body"
                        id="bodyInput"
                        style="display: none"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="is_pinned" />
                        <i class="fas fa-thumbtack"></i>
                        تثبيت التبليغ في الأعلى
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-accent" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> نشر التبليغ
                    </button>
                    <button
                        type="button"
                        class="btn btn-ghost"
                        onclick="showPreview()"
                    >
                        <i class="fas fa-eye"></i> معاينة
                    </button>
                    <a
                        href="{{ url_for('announcements.index') }}"
                        class="btn btn-ghost"
                        >إلغاء</a
                    >
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Image Size Modal -->
<div id="imageSizeModal" class="image-size-modal" style="display: none">
    <div class="image-size-modal-content">
        <div class="image-size-modal-header">
            <h3><i class="fas fa-image"></i> إدراج صورة</h3>
            <button
                class="image-size-modal-close"
                onclick="closeImageSizeModal()"
            >
                &times;
            </button>
        </div>
        <div class="image-size-modal-body">
            <div class="image-preview-area">
                <img id="modalPreviewImage" alt="معاينة الصورة" />
            </div>
            <div class="image-info">
                <p>
                    <i class="fas fa-info-circle"></i> الأبعاد الأصلية:
                    <span id="originalDimensions">-</span>
                </p>
            </div>
            <div class="image-size-options">
                <label class="size-option">
                    <input
                        type="radio"
                        name="imageSize"
                        value="small"
                        checked
                    />
                    <span>صغير</span>
                    <small>300px</small>
                </label>
                <label class="size-option">
                    <input type="radio" name="imageSize" value="medium" />
                    <span>متوسط</span>
                    <small>600px</small>
                </label>
                <label class="size-option">
                    <input type="radio" name="imageSize" value="large" />
                    <span>كبير</span>
                    <small>900px</small>
                </label>
                <label class="size-option">
                    <input type="radio" name="imageSize" value="original" />
                    <span>أصلي</span>
                    <small>الحجم الأصلي</small>
                </label>
                <label class="size-option">
                    <input type="radio" name="imageSize" value="custom" />
                    <span>مخصص</span>
                    <small>إدخال يدوي</small>
                </label>
            </div>
            <div
                class="custom-size-input"
                id="customSizeInput"
                style="display: none"
            >
                <input
                    type="number"
                    id="customWidth"
                    placeholder="العرض"
                    class="form-control"
                    min="50"
                    max="2000"
                    value="500"
                />
                <span class="custom-size-sep">x</span>
                <input
                    type="number"
                    id="customHeight"
                    placeholder="الارتفاع (اتركه فارغاً للاحتفاظ بالنسبة)"
                    class="form-control"
                    min="50"
                    max="2000"
                />
            </div>
        </div>
        <div class="image-size-modal-footer">
            <button
                type="button"
                class="btn btn-accent"
                onclick="insertImageWithSize()"
            >
                إدراج الصورة
            </button>
            <button
                type="button"
                class="btn btn-ghost"
                onclick="closeImageSizeModal()"
            >
                إلغاء
            </button>
        </div>
    </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" style="display: none">
    <div class="preview-modal-content">
        <div class="preview-modal-header">
            <h3><i class="fas fa-eye"></i> معاينة التبليغ</h3>
            <button class="preview-close" onclick="closePreview()">
                &times;
            </button>
        </div>
        <div class="preview-modal-body">
            <div class="preview-badge-area"></div>
            <h2 class="preview-title"></h2>
            <div class="preview-meta"></div>
            <div class="preview-content" id="previewContent"></div>
        </div>
    </div>
</div>

<style>

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 9px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text-2);
    }
    .checkbox-label input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
        cursor: pointer;
    }
    .checkbox-label i {
        color: var(--accent);
    }

    /* Form Actions */
    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
        flex-wrap: wrap;
    }

    /* Editor Toolbar */
    .editor-toolbar {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--r-sm) var(--r-sm) 0 0;
        padding: 8px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        position: sticky;
        top: 56px;
        z-index: 50;
    }

    .toolbar-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 6px 12px;
        cursor: pointer;
        color: var(--text);
        font-size: 13px;
        transition: var(--t);
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .toolbar-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent);
        color: var(--accent);
    }

    .toolbar-divider {
        width: 1px;
        height: 24px;
        background: var(--border);
        margin: 0 4px;
    }

    /* Rich Editor */
    .rich-editor {
        min-height: 350px;
        max-height: 450px;
        overflow-y: auto;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--r-sm) var(--r-sm);
        padding: 16px;
        color: var(--text);
        font-size: 14px;
        line-height: 1.8;
        direction: rtl;
        text-align: right;
    }

    .rich-editor:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .rich-editor:empty:before {
        content: attr(data-placeholder);
        color: var(--text-3);
        opacity: 0.6;
    }

    .rich-editor img {
        max-width: 100%;
        height: auto;
        border-radius: var(--r-sm);
        margin: 10px 0;
        cursor: pointer;
        display: block;
    }

    .rich-editor h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 16px 0 8px;

    .rich-editor h2 {
        font-size: 24px;
        font-weight: 700;
        margin: 14px 0 6px;
    }
    .rich-editor h3 {
        font-size: 20px;
        font-weight: 600;
        margin: 12px 0 4px;
    }
    .rich-editor ul,
    .rich-editor ol {
        padding-right: 20px;
        margin: 10px 0;
    }

    /* Image Size Modal */
    .image-size-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .image-size-modal-content {
        background: var(--bg-card-2);
        border-radius: var(--r-lg);
        width: 90%;
        max-width: 500px;
        max-height: 90vh;

        border: 1px solid var(--border-2);

    .image-size-modal-header {

    .image-size-modal-close {

        cursor: pointer;

    .image-size-modal-close:hover {

    .image-size-modal-body {

    .image-preview-area {

    .size-option {

    }

    .preview-modal-header h3 {

    .preview-title {

        margin-bottom: 12px;

    @media (max-width: 600px) {
        .editor-toolbar {
            position: relative;
            top: 0;

        .toolbar-btn {

        .form-actions .btn {

            grid-template-columns: repeat(2, 1fr);
        }
        .custom-size-input {

</style>

<script>
    // DOM Elements
    const editor = document.getElementById('editor');
    const bodyInput = document.getElementById('bodyInput');
    const titleInput = document.getElementById('titleInput');
    const prioritySelect = document.getElementById('prioritySelect');

    // Draft storage
    const DRAFT_KEY = 'ann_draft_body';
    const TITLE_KEY = 'ann_draft_title';
    const SUBMITTED_KEY = 'ann_just_submitted';

    // Image paste handling
    let pendingImageFile = null;
    let pendingImageDimensions = { width: 0, height: 0 };
    let pendingImageUrl = null;

    // Clear draft if submitted
    if (sessionStorage.getItem(SUBMITTED_KEY)) {
        sessionStorage.removeItem(SUBMITTED_KEY);
        localStorage.removeItem(DRAFT_KEY);
        localStorage.removeItem(TITLE_KEY);
    }

    // Restore drafts
    const savedBody = localStorage.getItem(DRAFT_KEY);
    const savedTitle = localStorage.getItem(TITLE_KEY);
    if (savedBody) editor.innerHTML = savedBody;
    if (savedTitle) titleInput.value = savedTitle;

    // Auto-save
    editor.addEventListener('input', () => {
        localStorage.setItem(DRAFT_KEY, editor.innerHTML);
    });
    titleInput.addEventListener('input', () => {
        localStorage.setItem(TITLE_KEY, titleInput.value);
    });

    // Cursor handling for formatting
    let savedRange = null;

    function saveCursor() {
        const sel = window.getSelection();
        if (sel && sel.rangeCount > 0) {
            savedRange = sel.getRangeAt(0).cloneRange();
        }
    }

    function restoreCursor() {
        if (savedRange) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedRange);
            savedRange = null;
        }
    }

    editor.addEventListener('mouseup', saveCursor);
    editor.addEventListener('keyup', saveCursor);
    editor.addEventListener('click', saveCursor);

    // Execute command on editor
    function execCommand(command, value = null) {
        editor.focus();
        restoreCursor();
        document.execCommand(command, false, value);
        editor.focus();
        localStorage.setItem(DRAFT_KEY, editor.innerHTML);
    }

    // Insert HTML at cursor
    function insertHTML(html) {
        editor.focus();
        restoreCursor();
        document.execCommand('insertHTML', false, html);
        editor.focus();
        localStorage.setItem(DRAFT_KEY, editor.innerHTML);
    }

    // Setup toolbar buttons
    document.querySelectorAll('.toolbar-btn').forEach(btn => {
        if (btn.tagName === 'LABEL') return;

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const command = btn.dataset.command;

            if (command === 'createLink') {
                const url = prompt('أدخل رابط URL:', 'https://');
                if (url) execCommand('createLink', url);
            } else {
                execCommand(command);
            }
        });
    });

    // Image upload via button
    const imageUpload = document.getElementById('imageUpload');

    if (imageUpload) {
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            if (file.size > 5 * 1024 * 1024) {
                alert('حجم الصورة كبير جداً. الحد الأقصى هو 5 ميجابايت.');
                imageUpload.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    pendingImageDimensions = { width: img.width, height: img.height };
                    pendingImageFile = file;
                    showImageSizeModal(event.target.result, img.width, img.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            imageUpload.value = '';
        });
    }

    // Handle paste events for images
    editor.addEventListener('paste', (e) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;

        for (const item of items) {
            if (item.type.indexOf('image') !== -1) {
                e.preventDefault();
                const file = item.getAsFile();

                if (file.size > 5 * 1024 * 1024) {
                    alert('حجم الصورة كبير جداً. الحد الأقصى هو 5 ميجابايت.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        pendingImageDimensions = { width: img.width, height: img.height };
                        pendingImageFile = file;
                        showImageSizeModal(event.target.result, img.width, img.height);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                break;
            }
        }
    });

    // Show image size modal
    function showImageSizeModal(imageUrl, originalWidth, originalHeight) {
        const modal = document.getElementById('imageSizeModal');
        const previewImg = document.getElementById('modalPreviewImage');
        const dimensionsSpan = document.getElementById('originalDimensions');

        previewImg.src = imageUrl;
        dimensionsSpan.textContent = `${originalWidth} × ${originalHeight} بكسل`;

        // Reset selections
        document.querySelectorAll('input[name="imageSize"]').forEach(radio => {
            radio.checked = radio.value === 'small';
        });
        document.getElementById('customSizeInput').style.display = 'none';
        document.getElementById('customWidth').value = originalWidth;
        document.getElementById('customHeight').value = '';

        modal.style.display = 'flex';
    }

    function closeImageSizeModal() {
        document.getElementById('imageSizeModal').style.display = 'none';
        pendingImageFile = null;
    }

    // Handle size option changes
    document.querySelectorAll('input[name="imageSize"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const customInput = document.getElementById('customSizeInput');
            if (e.target.value === 'custom') {
                customInput.style.display = 'flex';
            } else {
                customInput.style.display = 'none';
            }
        });
    });

    // Upload and insert image
    async function insertImageWithSize() {
        if (!pendingImageFile) {
            alert('لا توجد صورة للإدراج');
            return;
        }

        const selectedSize = document.querySelector('input[name="imageSize"]:checked').value;
        let width = null;
        let height = null;

        switch (selectedSize) {
            case 'small':
                width = 300;
                break;
            case 'medium':
                width = 600;
                break;
            case 'large':
                width = 900;
                break;
            case 'original':
                width = pendingImageDimensions.width;
                height = pendingImageDimensions.height;
                break;
            case 'custom':
                width = parseInt(document.getElementById('customWidth').value);
                const customHeight = document.getElementById('customHeight').value;
                if (isNaN(width) || width < 50) {
                    alert('يرجى إدخال عرض صحيح (50-2000 بكسل)');
                    return;
                }
                if (customHeight && !isNaN(parseInt(customHeight))) {
                    height = parseInt(customHeight);
                }
                break;
        }

        const submitBtn = document.querySelector('#imageSizeModal .btn-accent');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';
        submitBtn.disabled = true;

        try {
            // Upload the image
            const formData = new FormData();
            formData.append('image', pendingImageFile);

            const response = await fetch('{{ url_for("announcements.upload_image") }}', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                // Build the image HTML
                let style = 'margin: 10px 0; display: block; border-radius: var(--r-sm);';
                if (width) {
                    style += ` width: ${width}px;`;
                }
                if (height) {
                    style += ` height: ${height}px;`;
                } else {
                    style += ` height: auto;`;
                }
                style += ` max-width: 100%;`;

                const imgHtml = `<img src="${data.url}" alt="Uploaded image" style="${style}">`;

                // Insert at cursor position
                insertHTML(imgHtml);

                closeImageSizeModal();
                pendingImageFile = null;
            } else {
                alert('خطأ في رفع الصورة: ' + (data.error || 'حدث خطأ غير معروف'));
            }
        } catch (err) {
            console.error('Upload error:', err);
            alert('حدث خطأ أثناء رفع الصورة: ' + err.message);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    // Preview functionality
    function showPreview() {
        const title = titleInput.value || 'عنوان التبليغ';
        const priority = prioritySelect.options[prioritySelect.selectedIndex]?.text || 'عادي';
        const priorityValue = prioritySelect.value;
        const content = editor.innerHTML || 'لا يوجد محتوى';

        const modal = document.getElementById('previewModal');
        document.getElementById('previewContent').innerHTML = content;
        modal.querySelector('.preview-title').textContent = title;

        const now = new Date();
        modal.querySelector('.preview-meta').innerHTML =
            `<i class="fas fa-user"></i> {{ session.full_name }} &nbsp;&nbsp;` +
            `<i class="fas fa-calendar"></i> ${now.toISOString().slice(0,10)} ${now.toTimeString().slice(0,5)}`;

        const badgeMap = { urgent: 'b-urgent', high: 'b-high', low: 'b-low', normal: 'b-normal' };
        modal.querySelector('.preview-badge-area').innerHTML =
            `<span class="badge ${badgeMap[priorityValue] || 'b-normal'}">${priority}</span>`;

        modal.style.display = 'flex';
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
    }

    // Global checkbox for superadmin
    {% if session.role == 'superadmin' %}
    const isGlobalCheckbox = document.getElementById('isGlobalCheckbox');
    const departmentSelect = document.getElementById('departmentSelect');
    if (isGlobalCheckbox && departmentSelect) {
        isGlobalCheckbox.addEventListener('change', function() {
            departmentSelect.disabled = this.checked;
            if (this.checked) {
                const opt = departmentSelect.querySelector('option[value="999"]');
                if (opt) opt.selected = true;
            } else {
                departmentSelect.value = '';
            }
        });
    }
    {% endif %}

    // Form submission
    document.getElementById('announcementForm').addEventListener('submit', function() {
        bodyInput.value = editor.innerHTML;
        sessionStorage.setItem(SUBMITTED_KEY, '1');
        localStorage.removeItem(DRAFT_KEY);
        localStorage.removeItem(TITLE_KEY);
    });

    // Close modals on escape
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closePreview();
            closeImageSizeModal();
        }
    });

    // Close modals when clicking outside
    document.getElementById('previewModal').addEventListener('click', function(e) {
        if (e.target === this) closePreview();
    });
    document.getElementById('imageSizeModal').addEventListener('click', function(e) {
        if (e.target === this) closeImageSizeModal();
    });

    // Make functions global
    window.showPreview = showPreview;
    window.closePreview = closePreview;
    window.closeImageSizeModal = closeImageSizeModal;
    window.insertImageWithSize = insertImageWithSize;

    // Focus editor
    editor.focus();

    console.log('Editor initialized successfully');
</script>

{% endblock %}
