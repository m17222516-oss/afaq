{% extends "base.html" %}
{% block title %}دخول — آفاق الفكر{% endblock %}
{% block full_page %}
<div class="login-wrap">
  <div class="login-bg-grid"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-ico"><i class="fas fa-globe"></i></div>
      <h1>آفاق الفكر</h1>
      <p>منصة إدارة التبليغات الداخلية</p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">اسم المستخدم <span class="req">*</span></label>
        <input name="username" type="text" class="form-control"
               placeholder="أدخل اسم المستخدم" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label">كلمة المرور <span class="req">*</span></label>
        <input name="password" type="password" class="form-control"
               placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-accent btn-block btn-lg">
        <i class="fas fa-sign-in-alt"></i> دخول إلى المنصة
      </button>
    </form>

    <div class="login-footer">
      <i class="fas fa-lock" style="color:var(--accent)"></i>
      بيئة عمل آمنة ومحمية
    </div>
  </div>
</div>
{% endblock %}
