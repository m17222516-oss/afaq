{% extends "base.html" %} {% block title %}دخول — آفاق الفكر{% endblock %} {%
block full_page %}
<div class="login-wrap">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-ico">
                <i class="fas fa-globe"></i>
            </div>
            <h1>آفاق الفكر</h1>
            <p>منصة إدارة التبليغات الداخلية</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label">
                    اسم المستخدم <span class="req">*</span>
                </label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="أدخل اسم المستخدم"
                    required
                    autocomplete="username"
                    autofocus
                />
            </div>

            <div class="form-group">
                <label class="form-label">
                    كلمة المرور <span class="req">*</span>
                </label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                />
            </div>

            <button type="submit" class="btn btn-accent btn-block btn-lg">
                <i class="fas fa-sign-in-alt"></i> دخول إلى المنصة
            </button>
        </form>

        <div class="login-footer">
            <i class="fas fa-shield-alt" style="color: var(--accent)"></i>
            <span>بيئة عمل آمنة ومحمية</span>
        </div>
    </div>
</div>

<style>
    /* Additional login page specific styles */
    .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
    }

    .login-card {
        background: var(--bg-card-2);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-2);
        border-radius: var(--r-lg);
        padding: 40px 36px;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 2;
        box-shadow: var(--sh-lg);
        transition: var(--t);
    }

    .login-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--sh);
    }

    .login-brand {
        text-align: center;
        margin-bottom: 32px;
    }

    .login-ico {
        width: 70px;
        height: 70px;
        border-radius: var(--r-xl);
        margin: 0 auto 16px;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: var(--sh-accent);
        transition: var(--t);
    }

    .login-ico i {
        color: var(--bg-card) !important;
    }

    body.light-theme .login-ico i {
        color: #ffffff !important;
    }

    .login-brand h1 {
        font-size: 24px;
        font-weight: 800;
        color: var(--text-white);
        letter-spacing: -0.5px;
        margin-bottom: 6px;
    }

    .login-brand p {
        font-size: 13px;
        color: var(--text-3);
        margin-top: 0;
    }

    .login-footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--text-3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
        .login-card {
            padding: 28px 24px;
        }

        .login-brand h1 {
            font-size: 20px;
        }

        .login-ico {
            width: 55px;
            height: 55px;
            font-size: 26px;
        }

        .btn-lg {
            padding: 10px 20px;
            font-size: 13px;
        }
    }

    /* Animation for form elements */
    .form-control {
        transition: all 0.3s ease;
    }

    .form-control:focus {
        transform: translateY(-1px);
    }

    .btn-accent {
        transition: all 0.3s ease;
    }

    .btn-accent:hover {
        transform: translateY(-2px);
        filter: brightness(0.95);
    }
</style>

<script>
    // Auto-focus on page load
    document.addEventListener("DOMContentLoaded", function () {
        const usernameInput = document.querySelector('input[name="username"]');
        if (usernameInput) {
            usernameInput.focus();
        }

        // Add enter key handler
        const form = document.querySelector("form");
        const passwordInput = document.querySelector('input[name="password"]');

        if (form && passwordInput) {
            passwordInput.addEventListener("keypress", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    form.submit();
                }
            });
        }
    });

    // Optional: Add a simple password visibility toggle
    function togglePasswordVisibility() {
        const passwordInput = document.querySelector('input[name="password"]');
        if (passwordInput) {
            const type =
                passwordInput.getAttribute("type") === "password"
                    ? "text"
                    : "password";
            passwordInput.setAttribute("type", type);

            // Optional: Change icon if you add a visibility button
            // You can add an eye icon button in the form if desired
        }
    }
</script>
{% endblock %}
